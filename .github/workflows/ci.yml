name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install
        run: bun install --frozen-lockfile

      - name: MIT-gate (no AGPL runtime dependency)
        run: bun run check:licenses

      - name: Lint + format (biome)
        run: bunx biome ci .

      - name: Typecheck (all workspaces)
        run: bun run typecheck

      - name: Test (unit)
        run: bun run test

      - name: Build (Next on Cloudflare/OpenNext)
        run: bun run build
